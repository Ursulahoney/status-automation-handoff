      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/incidents.json
          git commit -m "Update incidents.json from issue #${{ github.event.issue.number }}" || exit 0

          # Pull latest and retry push (handles concurrent pushes)
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push && break
            echo "Push failed, retrying ($i)..."
            sleep 2
          done
