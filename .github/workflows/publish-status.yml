name: Publish Status Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build status outputs
        run: python scripts/build_status_page.py

      - name: Commit outputs
        run: |
          git config user.name "status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/status.html public/status.json
          git commit -m "Rebuild status page" || exit 0
          git push
